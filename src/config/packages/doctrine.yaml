doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            Identity:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Identity/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'StockFlow\Identity\Domain\Entity'
                alias: Identity
                mapping: true

            Warehouse:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Warehouse/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'StockFlow\Warehouse\Domain'
                alias: Warehouse
                mapping: true

            Catalog:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Catalog/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'StockFlow\Catalog\Domain'
                alias: Catalog
                mapping: true

            Document:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Document/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'StockFlow\Document\Domain'
                alias: Document
                mapping: true

            SharedCatalog:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Catalog/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'StockFlow\Shared\Catalog\Domain'
                alias: SharedCatalog
                mapping: true


        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
