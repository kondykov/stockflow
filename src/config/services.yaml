# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    upload_public_dir: '%kernel.project_dir%/public/uploads'
    upload_private_dir: '%kernel.project_dir%/var/storage/private'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    StockFlow\:
        resource: '../src/'
        exclude:
            - '../src/**/Domain/Entity/'
            - '../src/**/Domain/Aggregate/'
            - '../src/**/Domain/ValueObject/'
            - '../src/Kernel.php'

    StockFlow\Shared\Kernel\Application\Extractor\ExtractorInterface:
        alias: StockFlow\Identity\Infrastructure\Extractor\UserExtractor

    StockFlow\Catalog\Application\Extractor\ProductExtractor: ~

    StockFlow\Shared\Kernel\Infrastructure\EventListener\ApiResponseListener:
        arguments:
            $env: '%kernel.environment%'
            $useWhoops: '%env(bool:APP_USE_WHOOPS_HTML)%'

    StockFlow\Shared\Kernel\Infrastructure\Bus\CommandBus:
        arguments:
            $commandBus: '@command.bus'

    StockFlow\Shared\Kernel\Infrastructure\Bus\QueryBus:
        arguments:
            $queryBus: '@query.bus'

    StockFlow\Shared\Kernel\Infrastructure\Storage\FileUploader:
        arguments:
            $publicDir: '%upload_public_dir%'
            $privateDir: '%upload_private_dir%'

    StockFlow\Shared\Kernel\Application\EventDispatcherInterface:
        class: StockFlow\Shared\Kernel\Infrastructure\Messenger\EventDispatcher
        arguments:
            $eventBus: '@event.bus'

    _instanceof:
        StockFlow\Shared\Kernel\Application\Command\CommandHandlerInterface:
            tags:
                - { name: messenger.message_handler, bus: command.bus }
        StockFlow\Shared\Kernel\Application\Query\QueryHandlerInterface:
            tags:
                - { name: messenger.message_handler, bus: query.bus }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
