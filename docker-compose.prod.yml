services:
  web:
    image: nginx:latest
    volumes:
      - ./src:/var/www/
      - ./env/nginx/prod.nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_static:/var/www/frontend:ro
    ports:
      - "8080:80"
    depends_on:
      - app
      - frontend-build
    networks:
      - stockflow-network
    container_name: stockflow.nginx

  frontend-build:
    build:
      context: ../stockflow.web
      dockerfile: Dockerfile
    container_name: stockflow.frontend.build
    volumes:
      - frontend_static:/var/www/
    networks:
      - stockflow-network

  app:
    container_name: stockflow.api
    build:
      context: .
      dockerfile: ./env/php/Dockerfile
      target: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www/
      - ./.env:/var/www/.env
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq
    networks:
      - stockflow-network

  consumer:
    build:
      context: .
      dockerfile: ./env/php/Dockerfile
      target: production
    command: php bin/console messenger:consume async -vv
    volumes:
      - ./src:/var/www/
      - ./.env:/var/www/.env
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - stockflow-network
    container_name: stockflow.consumer

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    ports:
      - "8085:5432"
    networks:
      - stockflow-network
    container_name: stockflow.db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"
      - "5672:5672"
    networks:
      - stockflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: stockflow.rabbitmq

networks:
  stockflow-network:
    driver: bridge

volumes:
  frontend_static:
